description: >-
  FOCUS-aligned FinOps profile for Typeform. Billing is a flat per-month plan
  fee (Basic, Plus, Business, Talent, Growth Flow) with response-tiered
  bundles, plus per-seat consumption inside the plan's user limits. Annual
  billing is ~30% cheaper. Enterprise / Growth Custom contracts are
  negotiated.
notes: >-
  Cost optimisation is mostly about right-sizing the response tier (10K
  responses sit between Plus 1K and Business 10K). The Workspaces feature
  enables internal allocation by team.
