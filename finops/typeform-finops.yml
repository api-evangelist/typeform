meters:
- name: plan_seat
  description: Seats consumed in the plan (capped at plan ceiling).
  unit: user-month
  aggregation: max
  dimensions:
  - workspace
- name: responses
  description: Form submissions counted against the plan's monthly bundle.
  unit: response
  aggregation: sum
  dimensions:
  - workspace
  - form
- name: plan_subscription
  description: Flat plan fee (Basic / Plus / Business / Talent / Growth Flow).
  unit: month
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Use the Typeform admin Usage page; export form-level submission counts for chargeback.
- name: Allocation
  description: Use Workspaces to map forms to teams; allocate seat + response cost downstream.
- name: Optimization
  description: Right-size plan tier annually; archive low-traffic forms; prefer webhook delivery over Responses-API polling.
- name: Accountability
  description: Assign workspace owners; alert when responses approach plan cap.
